<div class="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
  <div class="bg-white rounded-2xl shadow-xl flex w-full max-w-4xl overflow-hidden">
    <!-- LEFT IMAGE -->
    <div class="w-1/2 hidden md:block">
      <img src="../../../assets/images/Rectangle 8820.png" class="w-full h-full object-cover" />
    </div>

    <!-- RIGHT LOGIN PANEL -->
    <div class="w-full md:w-1/2 p-10 relative">
      <!-- Close (X) -->
      <button
        (click)="closeLogin()"
        class="absolute top-4 right-4 text-gray-500 hover:text-gray-700 hover:text-bg-red-200 text-2xl"
      >
        ✕
      </button>

      <h2 class="text-2xl font-semibold text-center mb-8">Login</h2>

      <!-- FORM -->
      <form class="space-y-6" (submit)="onSubmit($event)">
        <!-- Phone Number -->
        <div>
          <label class="text-sm text-gray-700 block mb-1">Enter Phone number</label>
          <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden">
            <span class="px-3 py-2 bg-gray-100 text-gray-700 border-r border-gray-300">+251</span>
            <input
              type="text"
              placeholder="phone number here"
              [value]="phoneNumber()"
              (input)="onPhoneInput($event)"
              class="flex-1 px-3 py-2 outline-none text-gray-700"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="text-sm text-gray-700 block mb-1">Enter password</label>
          <div class="relative">
            <input
              [type]="showPassword() ? 'text' : 'password'"
              placeholder="Enter password"
              [value]="password()"
              (input)="onPasswordInput($event)"
              class="w-full border border-gray-300 rounded-lg px-4 py-2 pr-12 outline-none focus:border-blue-500"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 focus:outline-none"
            >
              @if (showPassword()) {
              <!-- Eye Slash Icon (Hide) -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                viewBox="0 0 20 20"
                fill="currentColor"
              >
                <path
                  fill-rule="evenodd"
                  d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z"
                  clip-rule="evenodd"
                />
                <path
                  d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z"
                />
              </svg>
              } @else {
              <!-- Eye Icon (Show) -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                viewBox="0 0 20 20"
                fill="currentColor"
              >
                <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                <path
                  fill-rule="evenodd"
                  d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z"
                  clip-rule="evenodd"
                />
              </svg>
              }
            </button>
          </div>
        </div>

        <!-- Login Button -->
        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
        >
          @if(isLoading()) {
          <svg
            class="animate-spin h-5 w-5 text-white"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
          <span>Logging in...</span>
          } @else {
          <span>Log in</span>
          }
        </button>

        <!-- Terms -->
        <div class="flex items-center gap-2">
          <input
            type="checkbox"
            class="w-4 h-4"
            [checked]="agreedToTerms()"
            (click)="toggleAgreedToTerms()"
          />
          <p class="text-sm text-gray-600">
            Agree to the
            <button
              (click)="termsmodle.set(true)"
              type="button"
              class="text-blue-600 hover:underline"
            >
              terms and conditions
            </button>
          </p>
        </div>

        <!-- Subscribe Link -->
        <p class="text-sm text-gray-600 text-center">Haven't subscribed yet??</p>

        <button
          type="button"
          (click)="handleSubscribeClick()"
          class="w-full border cursor-pointer border-blue-600 text-blue-600 py-2 rounded-lg font-medium hover:bg-blue-50 transition flex items-center justify-center gap-2"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
          </svg>
          <span>Subscribe here</span>
        </button>

        <!-- Footer text -->
        <p class="text-center text-gray-500 text-xs mt-2">3 days free | 2 birr / day</p>
      </form>
    </div>
  </div>
</div>
@if(termsmodle()){
<app-terms-and-conditions
  (oncloseterms)="closeterms()"
  (onacceptterms)="agreed()"
></app-terms-and-conditions>
}
