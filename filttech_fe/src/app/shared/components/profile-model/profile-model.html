<a routerLink="/s/profile" class="flex gap-2 items-center pb-2 border-b border-gray-100">
  <img
    [src]="profile()"
    class="w-9 h-9 border border-blue-300 object-cover rounded-full"
    alt="Profile"
  />
  <p class="font-medium text-sm capitalize text-gray-600 mt-0.5 line-clamp-1">@{{ username() }}</p>
  <div class="ml-auto">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path
        d="M7.125 4.5L11.625 9L7.125 13.5"
        stroke="#515863"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </div>
</a>
