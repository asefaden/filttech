<div class="flex items-center gap-1">
  @for (i of stars(); track i) {
  <div
    class="relative cursor-pointer"
    [class]="starSizeClass()"
    (mouseenter)="setHover(i + 1)"
    (mouseleave)="clearHover()"
    (click)="setRating(i + 1)"
  >
    <!-- Background Star -->
    <svg
      class="absolute inset-0 w-full h-full text-gray-300"
      fill="currentColor"
      viewBox="0 0 20 20"
    >
      <path
        d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.286 3.967a1 1 0 0 0 .95.69h4.18c.969 0 1.371 1.24.588 1.81l-3.385 2.46a1 1 0 0 0-.364 1.118l1.287 3.966c.3.922-.755 1.688-1.54 1.118l-3.385-2.46a1 1 0 0 0-1.176 0l-3.385 2.46c-.784.57-1.838-.196-1.539-1.118l1.287-3.966a1 1 0 0 0-.364-1.118L2.083 9.394c-.783-.57-.38-1.81.588-1.81h4.18a1 1 0 0 0 .95-.69l1.286-3.967z"
      />
    </svg>

    <!-- Animated Fill Star -->
    <div class="absolute inset-0 overflow-hidden">
      <div
        class="h-full text-yellow-400 transition-all duration-300"
        [style.width.%]="(hoverIndex() || rating()) >= i + 1 ? 100 : 0"
      >
        <svg class="w-full h-full" fill="currentColor" viewBox="0 0 20 20">
          <path
            d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.286 3.967a1 1 0 0 0 .95.69h4.18c.969 0 1.371 1.24.588 1.81l-3.385 2.46a1 1 0 0 0-.364 1.118l1.287 3.966c.3.922-.755 1.688-1.54 1.118l-3.385-2.46a1 1 0 0 0-1.176 0l-3.385 2.46c-.784.57-1.838-.196-1.539-1.118l1.287-3.966a1 1 0 0 0-.364-1.118L2.083 9.394c-.783-.57-.38-1.81.588-1.81h4.18a1 1 0 0 0 .95-.69l1.286-3.967z"
          />
        </svg>
      </div>
    </div>
  </div>
  }
</div>
