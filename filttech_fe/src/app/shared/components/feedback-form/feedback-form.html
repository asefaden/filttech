<div class="max-w-2xl mx-auto mt-12 p-6 bg-white rounded-lg shadow-md">
  <h2 class="text-2xl font-bold mb-6 text-gray-800">Share Your Feedback</h2>

  <form (ngSubmit)="submitFeedback()" class="space-y-6">
    <!-- Rating Section -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2"> Rate Your Experience </label>
      <app-star-rating-input [maxStars]="5" [(rating)]="rating" [size]="'lg'" />
      @if (rating() > 0) {
      <p class="mt-2 text-sm text-gray-600">You rated: {{ rating() }} out of 5 stars</p>
      }
    </div>

    <!-- Message Section -->
    <div>
      <label for="feedback-message" class="block text-sm font-medium text-gray-700 mb-2">
        Your Feedback
      </label>
      <textarea
        id="feedback-message"
        [(ngModel)]="message"
        name="message"
        rows="5"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
        placeholder="Tell us about your experience..."
      ></textarea>
    </div>

    <!-- Success Message -->
    @if (submitSuccess()) {
    <div class="p-4 bg-green-50 border border-green-200 rounded-lg">
      <p class="text-green-800 text-sm font-medium">✓ Thank you for your feedback!</p>
    </div>
    }

    <!-- Error Message -->
    @if (submitError()) {
    <div class="p-4 bg-red-50 border border-red-200 rounded-lg">
      <p class="text-red-800 text-sm">{{ submitError() }}</p>
    </div>
    }

    <!-- Submit Button -->
    <button
      type="submit"
      [disabled]="isSubmitting() || !message() || rating() === 0"
      class="w-full py-3 px-4 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors"
    >
      @if (isSubmitting()) {
      <span>Submitting...</span>
      } @else {
      <span>Submit Feedback</span>
      }
    </button>
  </form>
</div>
