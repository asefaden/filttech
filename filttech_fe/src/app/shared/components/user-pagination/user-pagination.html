@if (totalPages() > 1) {
<div class="lg:mt-20 md:mt-25 mt-15 mb-10 mx-auto max-w-fit flex items-center">
  <nav
    class="flex items-center gap-3 px-4 py-2 bg-transparent rselect-none"
    aria-label="Pagination"
  >
    <!-- Previous Button -->
    <button
      (click)="previousPage()"
      [disabled]="currentPage() === 1"
      [class.opacity-50]="currentPage() === 1"
      [class.cursor-not-allowed]="currentPage() === 1"
      class="p-2 text-gray-500 hover:bg-gray-100 hover:text-gray-700 rounded-md transition-colors text-2xl mr-6 disabled:hover:bg-transparent cursor-pointer"
      aria-label="Previous page"
    >
      &lt;
    </button>

    <!-- Page Numbers -->
    @for (page of getPageNumbers(); track page) { @if (page === -1) {
    <span class="text-gray-500 px-1">...</span>
    } @else {
    <button
      (click)="goToPage(page)"
      [class.bg-blue-500]="page === currentPage()"
      [class.text-black]="page === currentPage()"
      [class.text-gray-700]="page !== currentPage()"
      [class.hover:bg-gray-100]="page !== currentPage()"
      class="flex items-center justify-center w-9 h-9 text-sm font-medium rounded-full transition-colors cursor-pointer"
    >
      {{ page }}
    </button>
    } }

    <!-- Next Button -->
    <button
      (click)="nextPage()"
      [disabled]="currentPage() === totalPages()"
      [class.opacity-50]="currentPage() === totalPages()"
      [class.cursor-not-allowed]="currentPage() === totalPages()"
      class="p-2 text-gray-500 hover:bg-gray-100 hover:text-gray-700 rounded-md transition-colors text-2xl ml-6 disabled:hover:bg-transparent cursor-pointer"
      aria-label="Next page"
    >
      &gt;
    </button>
  </nav>
</div>
}
