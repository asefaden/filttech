<div class="inline-flex items-center gap-2">
  <!-- Stars container -->
  <div class="relative inline-block leading-none">
    <!-- Empty stars (background) -->
    <div class="flex" [class]="starSizeClass()">
      @for (i of stars(); track i) {
      <span class="text-gray-300">★</span>
      }
    </div>

    <!-- Filled stars (overlay clipped by width) -->
    <div
      class="absolute inset-0 flex overflow-hidden whitespace-nowrap"
      [style.width.%]="percentage()"
      [class]="starSizeClass()"
    >
      @for (i of stars(); track i) {
      <span class="text-yellow-400 drop-shadow-sm">★</span>
      }
    </div>
  </div>

  <!-- Optional rating number -->
  @if (showNumber()) {
  <span class="text-sm font-medium text-gray-600"> {{ rating().toFixed(1) }} / {{ max() }} </span>
  }
</div>
