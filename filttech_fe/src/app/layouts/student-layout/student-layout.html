<nav
  class="w-full py-6 flex items-center justify-between px-8 md:px-10 lg:px-20 sticky top-0 bg-white z-50 shadow-[0_0_40px_0_rgba(59,130,246,0.06)]"
>
  <div class="flex gap-8 items-center">
    <div class="relative md:hidden">
      <div class="flex gap-4 items-center">
        @if (!mobileSidebar()) {
        <button (click)="toggle($event)">
          <img src="../../../assets/images/Vector (2).svg" class="w-5 h-5" alt="" />
        </button>
        }@else{
        <button (click)="toggle($event)" class="w-5 h-5 mb-3 text-xl">x</button>
        }
      </div>
    </div>
    <div class="text-2xl font-bold"><img src="../../../../assets/images/logo.svg" alt="" /></div>
  </div>
  <!-- Nav Links -->
  <div class="hidden md:flex space-x-10 text-gray-600">
    <a routerLink="courses" routerLinkActive="text-blue-500 " class="hover:text-blue-600"
      >Courses</a
    >
    <a routerLink="experts" routerLinkActive="text-blue-500 " class="hover:text-blue-600"
      >Experts</a
    >
    <a routerLink="blogs" routerLinkActive="text-blue-500 " class="hover:text-blue-600">Blogs</a>
    <a routerLink="books" routerLinkActive="text-blue-500 " class="hover:text-blue-600">Books</a>
  </div>

  <div class="flex gap-4 items-center lg:pr-12">
    <div class="relative">
      <button
        (click)="toggleNotfication()"
        (clickOutside)="isNotficaionOpen.set(false)"
        class="relative top-0.5 cursor-pointer"
      >
        <img src="../../../assets/images/notfcation.svg" alt="" />
        @if (unreadCount() > 0) {
        <span
          class="absolute -top-1 -right-1 bg-yellow-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-semibold"
        >
          {{ unreadCount() > 9 ? '9+' : unreadCount() }}
        </span>
        }
      </button>
      @if (isNotficaionOpen()) {
      <!-- NOTIFICATION DROPDOWN CONTAINER -->
      <div
        app-notfication
        (closeDropdown)="toggleNotfication()"
        class="w-96 absolute top-12 md:-right-12 -right-14 bg-white rounded-xl shadow-xl border border-gray-200 animate-enter"
      ></div>
      }
    </div>

    <div class="flex items-start relative">
      <button
        class="cursor-pointer"
        (click)="toggleProfile()"
        (clickOutside)="isProfileOpen.set(false)"
      >
        <img [src]="profileImage()" class="w-9 h-9 object-cover rounded-full" alt="Profile" />
      </button>

      @if(isProfileOpen()){
      <div
        app-profile-model
        [profile]="profileImage()"
        [username]="username()"
        (onlogout)="logout()"
        class="w-50 p-5 absolute top-12 right-0 bg-white rounded-lg shadow-xl border border-gray-200 flex flex-col gap-2 transition-all duration-300 origin-top animate-enter"
      ></div>
      }
    </div>
  </div>
</nav>

<!-- moble sidebar  -->
<div (clickOutside)="mobileSidebar.set(false)">
  <div
    class="fixed min-h-screen top-0 left-0 flex flex-col bg-white md:hidden text-gray-600 z-100 shadow-lg gap-10 w-60 py-6 px-12 transform transition-transform duration-300 ease-in-out"
    [class]="mobileSidebar() ? '' : '-translate-x-full'"
  >
    <div class="mb-6 mt-4"><img src="../../../../assets/images/logo.svg" alt="" /></div>
    <a routerLink="courses" routerLinkActive="text-blue-500 " class="hover:text-blue-600"
      >Courses</a
    >
    <a routerLink="experts" routerLinkActive="text-blue-500 " class="hover:text-blue-600"
      >Experts</a
    >
    <a routerLink="blogs" routerLinkActive="text-blue-500 " class="hover:text-blue-600">Blogs</a>
    <a routerLink="books" routerLinkActive="text-blue-500 " class="hover:text-blue-600">Books</a>
  </div>
</div>

<div class="">
  <router-outlet></router-outlet>
</div>
