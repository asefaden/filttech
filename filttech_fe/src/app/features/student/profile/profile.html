<div class="min-h-[cal(100vh-100px)] bg-white">
  <!-- Header with Avatar -->
  <div class="bg-[#EEF5FF] md:pt-6 pb-2 md:mb-12">
    <div class="max-w-4xl mx-auto px-4 relative md:top-[100px] top-[50px]">
      <div class="flex justify-center">
        <div class="relative">
          <div
            class="w-24 h-24 rounded-full bg-white border-4 border-white shadow-lg flex items-center justify-center"
          >
            <img [src]="profileImage()" class="w-full h-full rounded-full object-cover" />
          </div>
        </div>
      </div>
      <h1 class="text-center text-2xl font-semibold text-gray-800 mt-4">{{ username() }}</h1>
    </div>
  </div>

  <!-- Profile Form -->
  <div class="max-w-4xl mx-auto px-4 py-8">
    <div class="bg-white p-8">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Left Section - Info Text -->
        <div class="lg:col-span-1">
          <h2 class="text-lg font-semibold text-gray-800 mb-2">Personal Info</h2>
          <p class="text-sm text-gray-500">
            You can change your personal information settings here.
          </p>
        </div>

        <!-- Right Section - Form Fields -->
        <div class="lg:col-span-2 space-y-6">
          <!-- Username Field -->
          <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>

          <div class="flex gap-2 items-center w-full">
            <div class="relative flex-1">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                  <path
                    fill-rule="evenodd"
                    d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
                    clip-rule="evenodd"
                  />
                </svg>
              </span>
              @if (isEditingName()) {
              <input
                type="text"
                [(ngModel)]="tempUsername"
                placeholder="Username"
                class="w-full pl-10 pr-24 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
              />
              } @else {
              <input
                type="text"
                [value]="username()"
                placeholder="Username"
                disabled
                class="w-full pl-10 pr-24 py-3 border border-gray-300 rounded-lg bg-gray-50 text-gray-700 cursor-not-allowed"
              />
              }
            </div>
            <button
              (click)="toggleEditName()"
              class="hover:text-gray-600 transition p-1 rounded-lg"
              [class.text-blue-600]="isEditingName()"
              [class.text-gray-400]="!isEditingName()"
            >
              <div class="p-2 border border-gray-300 rounded-lg">
                @if (isEditingName()) {

                <svg class="w-5 h-5" fill="none" stroke="#008000" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M5 13l4 4L19 7"
                  />
                </svg>

                } @else {
                <svg
                  width="21"
                  height="21"
                  viewBox="0 0 21 21"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M10 1.99609H3C2.46957 1.99609 1.96086 2.20681 1.58579 2.58188C1.21071 2.95695 1 3.46566 1 3.99609V17.9961C1 18.5265 1.21071 19.0352 1.58579 19.4103C1.96086 19.7854 2.46957 19.9961 3 19.9961H17C17.5304 19.9961 18.0391 19.7854 18.4142 19.4103C18.7893 19.0352 19 18.5265 19 17.9961V10.9961"
                    stroke="#B9BEC6"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M16.3751 1.62132C16.7729 1.2235 17.3125 1 17.8751 1C18.4377 1 18.9773 1.2235 19.3751 1.62132C19.7729 2.01914 19.9964 2.55871 19.9964 3.12132C19.9964 3.68393 19.7729 4.2235 19.3751 4.62132L10.3621 13.6353C10.1246 13.8726 9.8313 14.0462 9.50909 14.1403L6.63609 14.9803C6.55005 15.0054 6.45883 15.0069 6.372 14.9847C6.28517 14.9624 6.20592 14.9173 6.14254 14.8539C6.07916 14.7905 6.03398 14.7112 6.01174 14.6244C5.98949 14.5376 5.991 14.4464 6.01609 14.3603L6.85609 11.4873C6.95062 11.1654 7.12463 10.8724 7.36209 10.6353L16.3751 1.62132Z"
                    stroke="#B9BEC6"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>

                }
              </div>
            </button>
          </div>

          <!-- Phone Number Field (Read-only) -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"
                  />
                </svg>
              </span>
              <input
                type="tel"
                [value]="phoneNumber()"
                placeholder="+251 9XXXXXXX"
                disabled
                class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg bg-gray-50 text-gray-700 cursor-not-allowed"
              />
            </div>
          </div>

          <!-- Change Avatar Section -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-4">Change Avatar</label>
            <div class="flex items-start gap-6">
              <!-- Avatar Preview -->
              <div class="flex-shrink-0">
                @if (avatarPreview()) {
                <img
                  [src]="avatarPreview()"
                  alt="Avatar preview"
                  class="w-16 h-16 rounded-full object-cover border-2 border-gray-200"
                />
                } @else {
                <div
                  class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center border-2 border-gray-200"
                >
                  <svg class="w-8 h-8 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                    <path
                      fill-rule="evenodd"
                      d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
                      clip-rule="evenodd"
                    />
                  </svg>
                </div>
                }
              </div>

              <!-- Upload Area -->
              <div class="flex-1">
                <input
                  type="file"
                  id="avatarInput"
                  accept="image/*"
                  (change)="onFileSelected($event)"
                  class="hidden"
                />
                <div
                  (click)="triggerFileInput()"
                  class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition"
                >
                  <svg
                    class="w-10 h-10 text-blue-500 mx-auto mb-3"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"
                    />
                  </svg>
                  <p class="text-sm text-gray-600">
                    <span class="text-blue-500 font-medium">Click here</span> to upload your file or
                    drag.
                  </p>
                  <p class="text-xs text-gray-400 mt-1">
                    Supported format: SVG, JPG, PNG | 10mb max
                  </p>
                </div>
              </div>
            </div>
          </div>

          <!-- Avatar Action Buttons -->
          @if (selectedFile()) {
          <div class="flex justify-end gap-3 pt-4">
            <button
              (click)="cancelAvatarUpload()"
              class="px-6 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition font-medium"
            >
              Cancel ✕
            </button>
            <button
              (click)="uploadAvatar()"
              class="px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium flex items-center gap-2"
            >
              Upload Avatar
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M5 13l4 4L19 7"
                />
              </svg>
            </button>
          </div>
          }
        </div>
      </div>
    </div>
  </div>
</div>
