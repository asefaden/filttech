@if (loading()) {
<div class="flex justify-center items-center min-h-screen">
  <div class="relative w-16 h-16">
    <div class="absolute top-0 left-0 w-full h-full border-4 border-blue-200 rounded-full"></div>
    <div
      class="absolute top-0 left-0 w-full h-full border-4 border-blue-600 rounded-full border-t-transparent animate-spin"
    ></div>
  </div>
</div>
} @else if (error()) {
<div class="flex flex-col items-center justify-center min-h-screen px-4">
  <p class="text-red-500 text-center mb-4">{{ error() }}</p>
  <button
    (click)="goBack()"
    class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors"
  >
    Go Back
  </button>
</div>
} @else if (blog()) {
<article class="min-h-screen px-4 max-w-4xl pb-40 mx-auto">
  <!-- Back Button -->
  <button
    (click)="goBack()"
    class="mb-6 flex items-center gap-2 text-gray-600 hover:text-gray-800 transition-colors"
  >
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path
        d="M19 12H5M12 19L5 12L12 5"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
    Back to Blogs
  </button>

  <!-- Hero Image -->
  <div class="overflow-hidden rounded-xl w-full md:h-[400px] h-[280px]">
    <img
      [src]="blog()!.thumbnail || '../../../../assets/images/Rectangle 32.png'"
      [alt]="blog()!.title"
      class="w-full h-full object-cover"
    />
  </div>

  <div class="w-full">
    <!-- Title -->
    <h1 class="mt-8 text-3xl font-bold text-gray-900 leading-relaxed pl-2">
      {{ blog()!.title }}
    </h1>
    <div class="pt-2 border-t-3 border-blue-600 w-12 h-1 mb-6 ml-2"></div>

    <!-- Article Body (Rich Text Content) -->
    <div
      class="text-lg md:text-xl text-gray-700 space-y-6 max-w-none prose prose-lg max-w-none"
      [innerHTML]="blog()!.content"
    ></div>
  </div>
</article>
}
