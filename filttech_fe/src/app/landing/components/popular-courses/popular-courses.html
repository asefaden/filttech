<div class="max-w-7xl mx-auto md:bg-[#EEF5FF] md:px-20 px-6 md:py-16 py-4 rounded-4xl">
  <h2 class="text-3xl font-bold text-center text-black mb-2">Popular Courses</h2>
  <p class="text-lg text-center text-[#7F848D] md:mb-14 max-w-xl mx-auto">
    Explore our most popular courses designed to help you master in-demand skills and advance your
    tech career.
  </p>
  @if (loading()) {
  <div class="text-center py-12">
    <p class="text-gray-500">Loading courses...</p>
  </div>
  } @else if (error()) {
  <div class="text-center py-12">
    <p class="text-red-500">{{ error() }}</p>
  </div>
  } @else {
  <div class="hidden md:grid md:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-16">
    @for (course of courses(); track course.id) {
    <app-course-card [course]="course" />
    }
  </div>
  }

  <div class="block md:hidden">
    <!-- for moblie make it slider -->
    <app-course-slider [courses]="courses()"></app-course-slider>
  </div>

  <a
    routerLink="/s/courses"
    class="text-center block text-[#3B82F6] max-w-fit mx-auto font-semibold lg:mt-12 cursor-pointer underline-offset-5 underline"
  >
    View More
  </a>
</div>
