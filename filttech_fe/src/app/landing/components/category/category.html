<div class="w-full px-6 py-10 flex lg:flex-row flex-col">
  <!-- Section Title -->
  <h2 class="text-2xl font-semibold mb-6 flex-1/4">
    <span class="pt-4 border-t-3 border-[#3B82F6] w-14 h-1 block"> </span>
    Top Category
  </h2>

  <!-- Grid -->
  @if (loading()) {
  <div class="flex justify-center items-center py-12 flex-3/4">
    <div class="relative w-12 h-12">
      <div class="absolute top-0 left-0 w-full h-full border-4 border-blue-200 rounded-full"></div>
      <div
        class="absolute top-0 left-0 w-full h-full border-4 border-blue-600 rounded-full border-t-transparent animate-spin"
      ></div>
    </div>
  </div>
  } @else {
  <div class="grid grid-cols-2 lg:grid-cols-3 gap-4 flex-3/4">
    @for (category of categories(); track category.id) {
    <div
      class="p-5 shadow-sm rounded-xl border border-[#C9DDFF] transition-all duration-300 hover:scale-105 hover:bg-[#D5E4FE] hover:shadow-md"
    >
      <div class="flex items-center gap-3">
        <div class="p-3 bg-[#ECF3FF]/70 rounded-full shrink-0">
          <img
            [src]="getCategoryImage(category)"
            [alt]="category.name"
            class="w-10 h-10 object-contain"
            (error)="handleImageError($event)"
          />
        </div>
        <h3 class="font-medium line-clamp-1">{{ category.name }}</h3>
      </div>

      <div class="flex items-center justify-between mt-4 text-sm">
        <span class="text-gray-500">View Courses</span>
        <a class="cursor-pointer" routerLink="/s/courses" [queryParams]="{ category: category.id }">
          <img src="/assets/images/Arrow 1.svg" class="w-4 h-4" alt="" />
        </a>
      </div>
    </div>
    }

    <!-- Explore Category Card -->
    <div
      class="p-5 rounded-xl bg-blue-600 text-white flex flex-col items-center shadow-lg relative overflow-hidden transition-all duration-300 hover:scale-105"
    >
      <h3 class="text-lg font-semibold">Explore Our Category</h3>

      <div class="mt-4 flex items-center gap-2 cursor-pointer hover:bg-white/30 transition">
        <a routerLink="/s/courses">
          <img src="/assets/images/Frame 1597885061.svg" class="w-11 h-11" alt="" />
        </a>
      </div>

      <!-- Decorative Lines -->
      <div class="absolute top-4 right-0 cursor-pointer">
