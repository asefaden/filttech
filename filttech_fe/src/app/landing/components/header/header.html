<div class="flex gap-8 items-center">
  <img src="../../../../assets/images/logo.svg" alt="" />
  <div class="text-2xl font-bold"></div>
</div>
<!-- Nav Links -->
<div class="hidden md:flex space-x-10">
  <a href="#home" [class]="isActive('home') ? 'text-blue-500' : 'text-gray-600 hover:text-black'"
    >Home</a
  >
  <a
    href="#courses"
    [class]="isActive('courses') ? 'text-blue-500' : 'text-gray-600 hover:text-black'"
    >Courses</a
  >
  <a
    href="#experts"
    [class]="isActive('experts') ? 'text-blue-500' : 'text-gray-600 hover:text-black'"
    >Experts</a
  >
  <a href="#blog" [class]="isActive('blog') ? 'text-blue-500' : 'text-gray-600 hover:text-black'"
    >Blog</a
  >
  <a href="#faq" [class]="isActive('faq') ? 'text-blue-500' : 'text-gray-600 hover:text-black'"
    >FAQ</a
  >
</div>

<!-- Register Button -->
<button
  (click)="openLogin()"
  class="hidden md:flex ml-6 text-[#1F2937] px-5 py-2 rounded-full shadow-2xl shadow-[#515863]/30 cursor-pointer flex items-center gap-3 hover:-translate-y-0.5 transition"
>
  Login
  <div class="bg-blue-600 p-3 rounded-full">
    <img src="../../../assets/images/Vector (4).svg" alt="" />
  </div>
</button>

<div class="relative md:hidden">
  <div class="flex gap-4 items-center">
    @if (!mobileSidebar()) {
    <button (click)="toggle()">
      <img src="../../../assets/images/Vector (2).svg" class="w-5 h-5" alt="" />
    </button>
    }@else{
    <button (click)="toggle()" class="w-5 h-5 mb-3 text-xl">x</button>
    }
  </div>

  @if (mobileSidebar()) {
  <div
    (clickOutside)="mobileSidebar.set(false)"
    class="absolute top-12 items-center text-center -right-5 flex flex-col bg-white md:hidden z-10 px-12 shadow-lg rounded-xl py-4 gap-10"
  >
    <a href="#home" [class]="isActive('home') ? 'text-blue-500' : 'text-gray-600 hover:text-black'"
      >Home</a
    >
    <a
      href="#courses"
      [class]="isActive('courses') ? 'text-blue-500' : 'text-gray-600 hover:text-black'"
      >Courses</a
    >
    <a
      href="#experts"
      [class]="isActive('experts') ? 'text-blue-500' : 'text-gray-600 hover:text-black'"
      >Experts</a
    >
    <a href="#blog" [class]="isActive('blog') ? 'text-blue-500' : 'text-gray-600 hover:text-black'"
      >Blog</a
    >
    <a href="#faq" [class]="isActive('faq') ? 'text-blue-500' : 'text-gray-600 hover:text-black'"
      >FAQ</a
    >
    <button
      (click)="openLogin()"
      class="flex text-[#1F2937] px-5 pb-2 rounded-full cursor-pointer flex items-center gap-3 hover:-translate-y-0.5 transition"
    >
      Login
    </button>
  </div>
  }
</div>
